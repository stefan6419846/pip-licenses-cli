name: CI

on:
- push
- pull_request
- workflow_dispatch

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test:
    runs-on: ubuntu-latest
    name: Test with Python ${{ matrix.python }}
    strategy:
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13', '3.14', '3.15-dev']
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: setup test environment
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python }}
      - name: install pip
        run:
          python -m pip install --upgrade pip wheel
      - name: Lint with black
        uses: psf/black@87928e6d6761a4a6d22250e1fee5601b3998086e  # 26.5.1
        with:
          options: "--check --diff"
      - name: Install dependencies
        run:
          python -m pip install -r requirements/dev.txt
      - name: Lint with flake8
        run:
          python -m flake8 .
      - name: Validate static typing with mypy
        run:
          mypy .
      - name: Test (SPDX support)
        run:
          python -m coverage run --data-file=.coverage.spdx -m unittest discover --verbose --start-directory tests
      - name: Test (Default)
        run: |
          python -m pip uninstall license-expression -y
          python -m coverage run --data-file=.coverage.no_spdx -m unittest discover --verbose --start-directory tests
      - name: Report coverage
        run: |
          python -m coverage combine
          python -m coverage report --fail-under=100
        if: ${{ matrix.python != '3.9' }}
